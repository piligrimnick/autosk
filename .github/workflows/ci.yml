name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # macos-14 is Apple Silicon (osx-arm64). ubuntu-latest is linux-x64.
        # linux-arm64 / win-x64 release assets exist too — wire them in once
        # we have runners for them.
        os: [ubuntu-latest, macos-26]
    runs-on: ${{ matrix.os }}

    steps:
      # All three actions are pinned to their Node.js 24 majors:
      #   checkout v5 / setup-go v6 / cache v5. Node 20-based majors are
      #   deprecated by GitHub and will be forced off on 2026-06-02.
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      # The Go binary is CGO-free and links no doltlite. doltlite is only
      # fetched when `make test` builds autoskd (the Rust daemon, the sole
      # doltlite consumer) via crates/autosk-core/build.rs. Cache it keyed on
      # that pin so we don't hit GitHub releases on every run.
      - name: Cache doltlite
        uses: actions/cache@v5
        with:
          path: .doltlite
          key: doltlite-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('crates/autosk-core/build.rs') }}

      - name: go vet
        run: make vet

      - name: build
        run: make build

      - name: test
        run: make test
