name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # macos-14 is Apple Silicon (osx-arm64). ubuntu-latest is linux-x64.
        # linux-arm64 / win-x64 release assets exist too — wire them in once
        # we have runners for them.
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      # Cache the auto-fetched libdoltlite so we don't hit GitHub releases on
      # every CI run. The Makefile pins DOLTLITE_VERSION, so the cache key is
      # stable per version + platform.
      - name: Cache doltlite
        uses: actions/cache@v4
        with:
          path: .doltlite
          key: doltlite-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Makefile') }}

      - name: go vet
        run: make vet

      - name: build
        run: make build

      - name: test
        run: make test
