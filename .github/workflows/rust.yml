name: Rust CI

# Exercises the autosk Rust workspace (autosk-core domain/store + autosk-proto
# wire contract + autoskd JSON-RPC server) on the two acceptance-criterion
# targets — linux-x64 and macOS arm64 — so the doltlite 0.11.8 static link is
# actually verified on both. This job also enforces the three §8 conformance
# gates as named, required (release-blocking) checks (see the gate steps below).
#
# This is separate from ci.yml (Go) on purpose. The Go binary is CGO-free and
# links no doltlite of its own; doltlite only enters ci.yml when `make test`
# builds autoskd (the Rust daemon, the sole doltlite consumer). Both pipelines
# therefore fetch the same 0.11.8 asset but keep independent caches (distinct
# key prefixes) so a bump can never silently serve a stale archive to one side.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        # macos-26 is Apple Silicon (osx-arm64). ubuntu-latest is linux-x64.
        # These are exactly the two targets Phase 0 acceptance criterion #1
        # requires `cargo build` + `cargo test -p autosk-core` to pass on.
        os: [ubuntu-latest, macos-26]
    runs-on: ${{ matrix.os }}

    steps:
      # Pinned to its Node.js 24 major (see ci.yml for the deprecation context).
      - uses: actions/checkout@v5

      # rustup ships preinstalled on GitHub-hosted runners; ensure a stable
      # toolchain with the components the checks below need (no third-party
      # action, mirroring the repo's preference for first-party/pinned tooling).
      - name: Set up Rust toolchain (stable + rustfmt + clippy)
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustup component add rustfmt clippy
          rustc --version
          cargo --version

      # The canonical Rust doltlite pin lives in build.rs
      # (DEFAULT_DOLTLITE_VERSION). Read it so the cache key tracks the pin
      # exactly and can never silently serve a stale version after a bump.
      - name: Resolve doltlite version
        id: doltlite
        run: |
          ver=$(grep -oE 'DEFAULT_DOLTLITE_VERSION: &str = "[0-9.]+"' \
            crates/autosk-core/build.rs | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          test -n "$ver" || { echo "could not parse DEFAULT_DOLTLITE_VERSION" >&2; exit 1; }
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "doltlite (Rust pin) = $ver"

      # Cache the auto-fetched libdoltlite so build.rs doesn't hit GitHub
      # releases on every run. The `doltlite-rust-<version>` key prefix keeps
      # this distinct from ci.yml's doltlite cache
      # (`doltlite-<os>-<arch>-<hash(build.rs)>`, the same 0.11.8 pin, fetched
      # there only to build autoskd in `make test`) so the two never collide.
      - name: Cache doltlite (Rust ${{ steps.doltlite.outputs.version }})
        uses: actions/cache@v5
        with:
          path: .doltlite
          key: doltlite-rust-${{ steps.doltlite.outputs.version }}-${{ runner.os }}-${{ runner.arch }}

      # Cache the crate registry/git so dependency downloads don't repeat. The
      # compiled `target/` is intentionally NOT cached — the workspace is tiny
      # and a clean compile is the most reliable signal for a de-risking gate.
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ runner.arch }}-

      - name: cargo fmt
        run: cargo fmt --all --check

      # First `cargo build` triggers build.rs, which shells
      # `scripts/fetch-doltlite.sh 0.11.8 <dest>` on a cold checkout and links
      # libdoltlite.a statically (the linux-x64 link order — -ldoltlite then
      # -lz -lpthread -lm — is what this job exists to verify under GNU ld).
      - name: cargo build
        run: cargo build --workspace

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Full workspace test pass: the doltlite spike tests (format_compat,
      # gc_readable, gc_stress), the read/write core, the executor, and the
      # wire-contract + daemon-RPC tests. autosk-proto + autoskd build with
      # plain serde (no doltlite); autosk-core and the autoskd integration
      # tests link libdoltlite.
      - name: cargo test
        run: cargo test --workspace

      # ---- §8 conformance gates (anti-drift; release blockers) --------------
      # These three suites are the cross-implementation anti-drift contract
      # from the plan (§8). `cargo test --workspace` above already runs them,
      # but they are surfaced here as NAMED, individually-failing steps so a
      # regression in any one is an obvious, required release blocker rather
      # than an anonymous subtest. Re-running the specific targets is cheap
      # (the crates are already compiled by the workspace pass).
      - name: "Gate §8.1 — executor behavioural parity"
        run: cargo test -p autosk-core --test executor

      - name: "Gate §8.2 — protocol golden round-trips"
        run: cargo test -p autosk-proto --test golden

      - name: "Gate §8.3 — migration/schema golden"
        run: cargo test -p autosk-core --test schema_golden
