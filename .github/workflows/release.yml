name: Release

# Publish a GitHub release with prebuilt binaries whenever a semver tag is
# pushed.
#
# Tag pattern is strict semver with an optional pre-release suffix:
#   v1.2.3        -> regular release
#   v1.2.3-rc1    -> auto-marked as pre-release (doesn't become "latest")
#
# A release ships TWO assets per the v2 architecture:
#   * autosk-<target>          the Go CLI + lazy TUI (pure JSON-RPC client)
#   * autoskd-<target>         the Bun daemon, compiled standalone (embeds Bun;
#                              no global bun needed at runtime). autosk auto-spawns
#                              it, so it MUST ship.
#
# There are no bundled extensions: the reference `feature-dev` workflow is the
# npm package `@autosk/feature-dev`, which the daemon installs on first run.
#
# Build matrix mirrors ci.yml so we only ship what CI exercises.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

# Least privilege: build jobs only read; only the release job writes.
permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-26
            target: osx-arm64
    runs-on: ${{ matrix.os }}

    steps:
      # Pinned to Node.js 24 majors (see ci.yml for the deprecation context).
      - uses: actions/checkout@v5
        with:
          # Makefile derives VERSION from `git describe --tags --always
          # --dirty` and bakes it into internal/buildinfo via ldflags. We
          # need the full history (and the tag itself) for the embedded
          # version to match the released tag.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      # The daemon is compiled with `bun build --compile`, so the release runner
      # needs Bun. The compiled binary embeds the Bun runtime — nothing needs
      # Bun at the user's runtime.
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: build autosk (Go CLI/TUI)
        run: make build

      # Compile autoskd into dist/pkg/bin/autoskd. Bake the tag/commit into the
      # daemon's reported version.
      - name: package autoskd
        env:
          AUTOSK_VERSION: ${{ github.ref_name }}
          AUTOSK_COMMIT: ${{ github.sha }}
        run: scripts/package-autoskd.sh dist/pkg

      - name: stage assets
        run: |
          mkdir -p dist/out
          cp bin/autosk           "dist/out/autosk-${{ matrix.target }}"
          cp dist/pkg/bin/autoskd "dist/out/autoskd-${{ matrix.target }}"
          chmod +x "dist/out/autosk-${{ matrix.target }}" "dist/out/autoskd-${{ matrix.target }}"

      - name: upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.target }}
          path: dist/out/*
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      # download-artifact crossed the Node 24 line later than the rest:
      # v6 is still on Node 20 (GitHub deprecation warning), v7 is the
      # first major with `runs.using: node24`. v8 also exists but ships
      # two behavioral breaks (digest-mismatch now fails, conditional
      # unzip) that we don't need here.
      - name: download artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          # Flatten per-artifact subdirectories so every asset lands
          # directly under dist/ for the upload glob below.
          merge-multiple: true

      # Anything with a '-' in the tag (v1.2.3-rc1, v1.2.3-beta.2, ...) is
      # treated as a pre-release: it won't be promoted to the repo's "latest"
      # release on github.com.
      - name: detect prerelease
        id: meta
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      # Extract release notes from CHANGELOG.md (Keep a Changelog 1.1.0
      # `## [<version>]` section). The script exits non-zero if the section
      # is missing or empty, which fails the job on purpose: every tag --
      # including pre-releases like v1.2.3-rc1 -- must have a matching
      # entry. No CHANGELOG entry, no release.
      - name: extract release notes from CHANGELOG.md
        run: |
          version="${GITHUB_REF_NAME#v}"
          scripts/changelog-section.sh "$version" > release-notes.md
          echo "--- release notes for ${GITHUB_REF_NAME} ---"
          cat release-notes.md
          echo "--- end release notes ---"

      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          flags=( --title "${GITHUB_REF_NAME}" --notes-file release-notes.md )
          if [[ "${{ steps.meta.outputs.prerelease }}" == "true" ]]; then
            flags+=( --prerelease )
          fi
          gh release create "${GITHUB_REF_NAME}" "${flags[@]}" dist/*

  # Push an updated Formula/autosk.rb into wierdbytes/homebrew-autosk so
  # `brew install wierdbytes/autosk/autosk` (and `brew upgrade`) pick up
  # the new release with no manual bookkeeping.
  #
  # The formula installs BOTH binaries (autosk + autoskd): v2 auto-spawn needs
  # autoskd on disk. There are no bundled extensions — the daemon installs the
  # `@autosk/feature-dev` npm package on first run.
  #
  # Pre-releases (tag contains '-') skip the bump: brew has no
  # 'pre-release channel' for taps, and we don't want rc/beta tags to
  # become what `brew install autosk` resolves to.
  bump-tap:
    needs: release
    if: "!contains(github.ref_name, '-')"
    runs-on: ubuntu-latest
    steps:
      # HOMEBREW_TAP_TOKEN is a fine-grained PAT scoped to
      # wierdbytes/homebrew-autosk with `contents: write`. github.token
      # can't push to a different repo, so we need an explicit
      # credential here.
      - name: checkout tap
        uses: actions/checkout@v5
        with:
          repository: wierdbytes/homebrew-autosk
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p assets
          gh release download "${GITHUB_REF_NAME}" \
            -R "${{ github.repository }}" \
            -D assets

      - name: render formula
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          version="${TAG#v}"
          mac_autosk_sha=$(sha256sum assets/autosk-osx-arm64   | awk '{print $1}')
          lin_autosk_sha=$(sha256sum assets/autosk-linux-x64   | awk '{print $1}')
          mac_daemon_sha=$(sha256sum assets/autoskd-osx-arm64  | awk '{print $1}')
          lin_daemon_sha=$(sha256sum assets/autoskd-linux-x64  | awk '{print $1}')

          cat > tap/Formula/autosk.rb <<EOF
          # NOTE: this file is regenerated end-to-end by the release workflow in
          # ${REPO} on every tagged release. Edit it by hand only if
          # you know what you're doing -- your changes will be overwritten on the
          # next release.
          class Autosk < Formula
            desc "Task manager and workflow manager for coding agents"
            homepage "https://github.com/${REPO}"
            version "${version}"
            license "MIT"

            # The Go CLI + the Bun daemon ship as separate per-arch binaries.
            on_macos do
              on_arm do
                url "https://github.com/${REPO}/releases/download/v#{version}/autosk-osx-arm64"
                sha256 "${mac_autosk_sha}"

                resource "autoskd" do
                  url "https://github.com/${REPO}/releases/download/v#{version}/autoskd-osx-arm64"
                  sha256 "${mac_daemon_sha}"
                end
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/${REPO}/releases/download/v#{version}/autosk-linux-x64"
                sha256 "${lin_autosk_sha}"

                resource "autoskd" do
                  url "https://github.com/${REPO}/releases/download/v#{version}/autoskd-linux-x64"
                  sha256 "${lin_daemon_sha}"
                end
              end
            end

            def install
              # Go CLI: the only per-arch \`url\` above downloads as the cask-style
              # bare filename, so install it as \`autosk\`.
              cli = OS.mac? ? "autosk-osx-arm64" : "autosk-linux-x64"
              bin.install cli => "autosk"

              # Bun daemon: autosk auto-spawns \`autoskd\` from alongside itself.
              resource("autoskd").stage do
                daemon = OS.mac? ? "autoskd-osx-arm64" : "autoskd-linux-x64"
                bin.install daemon => "autoskd"
              end
            end

            test do
              # \`autosk version\` prints the buildinfo Version string, which is
              # the same tag we point the URL at. Substring-match so it works
              # whether or not the build embedded a leading 'v'.
              assert_match version.to_s, shell_output("#{bin}/autosk version")
              # The daemon ships alongside (first-run installs feature-dev from npm).
              assert_predicate bin/"autoskd", :exist?
            end
          end
          EOF

      - name: commit and push
        working-directory: tap
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git config user.name  "autosk-release-bot"
          git config user.email "autosk-release-bot@users.noreply.github.com"
          git add Formula/autosk.rb
          if git diff --staged --quiet; then
            echo "formula already up to date for ${TAG}; nothing to push"
            exit 0
          fi
          git commit -m "autosk ${TAG}"
          git push
