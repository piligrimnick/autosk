name: Release

# Publish a GitHub release with prebuilt binaries whenever a semver tag is
# pushed.
#
# Tag pattern is strict semver with an optional pre-release suffix:
#   v1.2.3        -> regular release
#   v1.2.3-rc1    -> auto-marked as pre-release (doesn't become "latest")
#
# Build matrix mirrors ci.yml so we only ship what CI exercises.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

# Least privilege: build jobs only read; only the release job writes.
permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: autosk-linux-x64
          - os: macos-26
            asset: autosk-osx-arm64
    runs-on: ${{ matrix.os }}

    steps:
      # Pinned to Node.js 24 majors (see ci.yml for the deprecation context).
      - uses: actions/checkout@v5
        with:
          # Makefile derives VERSION from `git describe --tags --always
          # --dirty` and bakes it into internal/buildinfo via ldflags. We
          # need the full history (and the tag itself) for the embedded
          # version to match the released tag.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      # Same cache as ci.yml so a release right after a green CI run on the
      # same SHA reuses the already-downloaded libdoltlite.
      - name: Cache doltlite
        uses: actions/cache@v5
        with:
          path: .doltlite
          key: doltlite-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Makefile') }}

      - name: build
        run: make build

      - name: stage binary
        run: |
          mkdir -p dist
          cp bin/autosk "dist/${{ matrix.asset }}"
          chmod +x "dist/${{ matrix.asset }}"

      - name: upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      # download-artifact crossed the Node 24 line later than the rest:
      # v6 is still on Node 20 (GitHub deprecation warning), v7 is the
      # first major with `runs.using: node24`. v8 also exists but ships
      # two behavioral breaks (digest-mismatch now fails, conditional
      # unzip) that we don't need here.
      - name: download artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          # Flatten per-artifact subdirectories so every binary lands
          # directly under dist/ for the upload glob below.
          merge-multiple: true

      # Anything with a '-' in the tag (v1.2.3-rc1, v1.2.3-beta.2, ...) is
      # treated as a pre-release: it won't be promoted to the repo's "latest"
      # release on github.com.
      - name: detect prerelease
        id: meta
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      # Extract release notes from CHANGELOG.md (Keep a Changelog 1.1.0
      # `## [<version>]` section). The script exits non-zero if the section
      # is missing or empty, which fails the job on purpose: every tag --
      # including pre-releases like v1.2.3-rc1 -- must have a matching
      # entry. No CHANGELOG entry, no release.
      - name: extract release notes from CHANGELOG.md
        run: |
          version="${GITHUB_REF_NAME#v}"
          scripts/changelog-section.sh "$version" > release-notes.md
          echo "--- release notes for ${GITHUB_REF_NAME} ---"
          cat release-notes.md
          echo "--- end release notes ---"

      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          flags=( --title "${GITHUB_REF_NAME}" --notes-file release-notes.md )
          if [[ "${{ steps.meta.outputs.prerelease }}" == "true" ]]; then
            flags+=( --prerelease )
          fi
          gh release create "${GITHUB_REF_NAME}" "${flags[@]}" dist/*

  # Push an updated Formula/autosk.rb into wierdbytes/homebrew-autosk so
  # `brew install wierdbytes/autosk/autosk` (and `brew upgrade`) pick up
  # the new release with no manual bookkeeping.
  #
  # Pre-releases (tag contains '-') skip the bump: brew has no
  # 'pre-release channel' for taps, and we don't want rc/beta tags to
  # become what `brew install autosk` resolves to.
  bump-tap:
    needs: release
    if: "!contains(github.ref_name, '-')"
    runs-on: ubuntu-latest
    steps:
      # HOMEBREW_TAP_TOKEN is a fine-grained PAT scoped to
      # wierdbytes/homebrew-autosk with `contents: write`. github.token
      # can't push to a different repo, so we need an explicit
      # credential here.
      - name: checkout tap
        uses: actions/checkout@v5
        with:
          repository: wierdbytes/homebrew-autosk
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p assets
          gh release download "${GITHUB_REF_NAME}" \
            -R "${{ github.repository }}" \
            -D assets

      - name: render formula
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          version="${TAG#v}"
          mac_sha=$(sha256sum assets/autosk-osx-arm64 | awk '{print $1}')
          lin_sha=$(sha256sum assets/autosk-linux-x64 | awk '{print $1}')

          cat > tap/Formula/autosk.rb <<EOF
          # NOTE: this file is regenerated end-to-end by the release workflow in
          # ${REPO} on every tagged release. Edit it by hand only if
          # you know what you're doing -- your changes will be overwritten on the
          # next release.
          class Autosk < Formula
            desc "Task manager and workflow manager for coding agents"
            homepage "https://github.com/${REPO}"
            version "${version}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/${REPO}/releases/download/v#{version}/autosk-osx-arm64"
                sha256 "${mac_sha}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/${REPO}/releases/download/v#{version}/autosk-linux-x64"
                sha256 "${lin_sha}"
              end
            end

            def install
              binary = OS.mac? ? "autosk-osx-arm64" : "autosk-linux-x64"
              bin.install binary => "autosk"
            end

            test do
              # \`autosk version\` prints the buildinfo Version string, which is
              # the same tag we point the URL at. Substring-match so it works
              # whether or not the build embedded a leading 'v'.
              assert_match version.to_s, shell_output("#{bin}/autosk version")
            end
          end
          EOF

      - name: commit and push
        working-directory: tap
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git config user.name  "autosk-release-bot"
          git config user.email "autosk-release-bot@users.noreply.github.com"
          git add Formula/autosk.rb
          if git diff --staged --quiet; then
            echo "formula already up to date for ${TAG}; nothing to push"
            exit 0
          fi
          git commit -m "autosk ${TAG}"
          git push
