name: Publish (npm + images)

# Continuous publishing on `main`, gated on a green CI run.
#
# Trigger model (plan §3 / R7): this workflow runs via `workflow_run` AFTER the
# `CI` workflow (ci.yml's `name:`) completes. The `if` below restricts it to a
# SUCCESSFUL CI run that was triggered by a PUSH to `main` — a red build, a PR,
# or any non-main branch never publishes. We then check out the EXACT commit CI
# validated (`workflow_run.head_sha`).
#
# What it does:
#   * npm — `scripts/publish-extensions.sh --publish` publishes every bumped
#     `@autosk/*` package via OIDC TRUSTED PUBLISHING (no NPM_TOKEN): the
#     `id-token: write` permission lets npm mint a short-lived OIDC credential
#     that it matches against each package's per-package trusted-publisher config
#     on npmjs.com. The script is version-gated, so a push that bumps no version
#     is a no-op per package; provenance is automatic under trusted publishing.
#   * images — the same script buildx-pushes the GHCR operator images
#     (pi-runtime + claude-runtime) multi-arch, authenticated with the built-in
#     GITHUB_TOKEN (`packages: write`). Images aren't version-gated; they are
#     tagged `latest` AND `sha-<short>` for rollbacks.
#
# One-time operator setup (NOT code — see the dev hand-off comment on the task):
#   * configure a trusted publisher for ALL 9 `@autosk/*` packages on npmjs.com
#     (org `wierdbytes`, repo `autosk`, workflow file `publish.yml`);
#   * the first GHCR push per image may need the package pre-linked to the repo
#     (or a CR_PAT if org policy blocks GITHUB_TOKEN).

on:
  workflow_run:
    workflows: ["CI"] # ci.yml's `name:` — gate on the core CI, not GUI CI
    types: [completed]

concurrency:
  group: publish-main
  cancel-in-progress: false

permissions:
  contents: read
  packages: write # GHCR push via GITHUB_TOKEN
  id-token: write # OIDC for npm trusted publishing

jobs:
  publish:
    # R7: only a green CI on a push to `main` publishes.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Publish the exact commit CI validated, not the branch tip.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # NO registry-url / token under OIDC — trusted publishing supplies the
      # credential from `id-token: write`.
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      # Trusted publishing requires a recent npm CLI (>= 11.5.1).
      - name: Upgrade npm (trusted publishing)
        run: npm install -g npm@latest

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags (latest + sha-<short>)
        id: tags
        run: |
          short="$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-12)"
          echo "tags=latest sha-${short}" >> "$GITHUB_OUTPUT"

      - name: publish (version-gated npm via OIDC + GHCR images)
        env:
          IMAGE_TAGS: ${{ steps.tags.outputs.tags }}
        run: scripts/publish-extensions.sh --publish
